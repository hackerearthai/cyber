<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mailedit</title>
<style>
body { font-family: Arial, sans-serif; width: 420px; margin: 0; padding: 10px; background: #f4f4f9; }
h2 { text-align: center; color: #2c3e50; }
button { background: #2980b9; color: #fff; border: none; padding: 10px; cursor: pointer; margin-top: 10px; width: 100%; font-size: 16px; border-radius: 5px; }
button:hover { background: #3498db; }
#results { margin-top: 10px; max-height: 400px; overflow-y: auto; background: #fff; padding: 10px; border-radius: 5px; }
.email { border-bottom: 1px solid #ddd; padding: 5px 0; }
.email h4 { margin: 0; color: #2c3e50; }
.email p { margin: 2px 0; font-size: 12px; }
.high { color: red; }
.moderate { color: orange; }
.low { color: green; }
#date-range { display: none; margin: 15px 0; padding: 12px; background: #fff; border-radius: 5px; border: 1px solid #ddd; }
.date-input-wrapper { margin: 10px 0; }
.date-input-wrapper label { display: block; font-weight: bold; color: #2c3e50; margin-bottom: 5px; font-size: 13px; }
.date-input-wrapper input[type="date"] { width: 100%; padding: 8px; border: 1px solid #bdc3c7; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
.date-input-wrapper input[type="date"]:focus { outline: none; border-color: #2980b9; box-shadow: 0 0 5px rgba(41, 128, 185, 0.3); }
.date-range-display { background: #ecf0f1; padding: 8px; border-radius: 4px; margin-top: 10px; font-size: 12px; text-align: center; color: #555; }
</style>
</head>
<body>
<h2>Mailedit Phishing Detector</h2>

<h3 style="font-size: 14px; margin: 10px 0 5px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Scan Links in Email</h3>
<div style="display: flex; gap: 10px; margin-bottom: 15px;">
  <button id="start-scanner-btn" style="flex: 1; background: #27ae60;">Start Scanner</button>
  <button id="stop-scanner-btn" style="flex: 1; background: #e74c3c; display: none;">Stop Scanner</button>
</div>
<div id="scanner-status" style="font-size:12px;color:#c0392b;margin-bottom:10px;"></div>

<h3 style="font-size: 14px; margin: 15px 0 5px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px;">Scan Emails</h3>

<label><input type="radio" name="range" value="24hrs" checked> Last 24 hours</label>
<label><input type="radio" name="range" value="custom"> Custom range</label>

<div id="date-range">
  <div class="date-input-wrapper">
    <label for="from-date">📅 From Date:</label>
    <input type="date" id="from-date">
  </div>
  <div class="date-input-wrapper">
    <label for="to-date">📅 To Date:</label>
    <input type="date" id="to-date">
  </div>
  <div class="date-range-display">
    <span id="date-range-text">Select dates to scan</span>
  </div>
</div>

<button id="scan-btn">Scan Emails</button>
<button id="view-results-btn" style="display:none; margin-top:5px;">View Results</button>
<div id="status"></div>
<div id="results"></div>

<script src="popup.js"></script>
<script src="url-scanner.js"></script>
</body>
</html>
